services:
  postgres:
    image: postgres:16-alpine
    container_name: qrmenu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qrmenu
    volumes:
      - qrmenu_pgdata:/var/lib/postgresql/data

volumes:
  qrmenu_pgdata:
